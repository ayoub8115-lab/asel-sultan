<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asel Sultan Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Cairo',sans-serif;
  color:white;
  background:url('background.jpg') no-repeat center center fixed;
  background-size:cover;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(10px);
  z-index:-1;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:28px;
  color:gold;
  font-weight:bold;
}

.logo-img{
  width:40px;
  height:auto;
}

.hero{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  padding:60px 20px;
  gap:40px;
}

.product-img{
  width:350px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,215,0,0.6);
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

.hero-text{
  max-width:400px;
  text-align:right;
}

.hero-text h1{
  font-size:36px;
  color:gold;
  margin-bottom:15px;
}

.price{
  font-size:30px;
  color:gold;
  margin:10px 0;
}

.old{
  text-decoration:line-through;
  color:#aaa;
}

.btn{
  background:linear-gradient(45deg,gold,#ffcc00);
  color:black;
  padding:15px 25px;
  border:none;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px gold;
}

.section{
  padding:60px 20px;
  text-align:center;
}

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:15px;
  width:250px;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 20px gold;
}

.testimonial{
  font-style:italic;
}

.form{
  max-width:400px;
  margin:auto;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

footer{
  padding:20px;
  text-align:center;
  background:black;
  color:gold;
}

.fade-in{
  opacity:0;
  transform:translateY(20px);
  transition:all 1s ease;
}

.fade-in.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="crown1.png" class="logo-img">
    <span>Asel Sultan</span>
  </div>
  <button class="btn" onclick="scrollToOrder()">اطلب الآن</button>
</header>

<section class="hero">
  <img src="product.jpg" class="product-img fade-in">

  <div class="hero-text fade-in">
    <h1>عسل السلطان بالجنسنغ</h1>
    <p>طاقة 🔥 نشاط ⚡ جودة فاخرة</p>
    <div class="old">200 DH</div>
    <div class="price">150 DH</div>
    <button class="btn" onclick="orderNow()">اطلب عبر واتساب</button>
  </div>
</section>

<section class="section">
  <h2>💎 المميزات</h2>
  <div class="cards">
    <div class="card fade-in">✔ طاقة يومية قوية</div>
    <div class="card fade-in">✔ عسل طبيعي + جينسينغ</div>
    <div class="card fade-in">✔ منتج فاخر ومجرب</div>
  </div>
</section>

<section class="section">
  <h2>⭐ آراء الزبناء</h2>
  <div class="cards">
    <div class="card testimonial fade-in">"منتوج خرافي عطاني طاقة"</div>
    <div class="card testimonial fade-in">"خدمة ممتازة والتوصيل سريع"</div>
  </div>
</section>

<section class="section" id="order">
  <h2>📦 اطلب الآن</h2>
  <div class="form">
    <input type="text" placeholder="الاسم الكامل">
    <input type="text" placeholder="رقم الهاتف">
    <input type="text" placeholder="المدينة">
    <button class="btn" onclick="sendOrder()">تأكيد الطلب</button>
  </div>
</section>

<footer>© Asel Sultan Premium</footer>

<script>
function orderNow(){
  window.open('https://wa.me/212665191677?text=بغيت%20نطلب%20Asel%20Sultan');
}

function scrollToOrder(){
  document.getElementById('order').scrollIntoView({behavior:'smooth'});
}

function sendOrder(){
  let inputs=document.querySelectorAll('input');
  let text=`طلب جديد:%0Aالاسم: ${inputs[0].value}%0Aالهاتف: ${inputs[1].value}%0Aالمدينة: ${inputs[2].value}`;
  window.open('https://wa.me/212665191677?text='+text);
}

const elements=document.querySelectorAll('.fade-in');

window.addEventListener('scroll',()=>{
  elements.forEach(el=>{
    const pos=el.getBoundingClientRect().top;
    if(pos < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
