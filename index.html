<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asel Sultan Premium</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
padding-top:70px;
}

/* BACKGROUND */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('background.jpg') no-repeat center center/cover;
z-index:-1;
transition:filter 0.5s ease, transform 0.5s ease;
}

body.scrolled::before{
filter:blur(8px);
transform:scale(1.05);
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:rgba(0,0,0,0.6);
backdrop-filter: blur(8px);
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

/* LANGUAGE DROPDOWN */
.lang-container{
position:relative;
}

.lang-btn{
font-size:26px;
cursor:pointer;
background:none;
border:none;
color:white;
}

.lang-menu{
display:none;
position:absolute;
top:40px;
right:0;
background:rgba(0,0,0,0.85);
padding:10px;
border-radius:10px;
min-width:140px;
}

.lang-menu button{
display:block;
width:100%;
background:none;
border:none;
color:white;
padding:8px;
cursor:pointer;
text-align:left;
font-size:16px;
}

.lang-menu button:hover{
background:gold;
color:black;
}

/* HERO */
.hero{
text-align:center;
padding:40px 20px
}

.main-logo{
width:160px;
display:block;
margin:30px auto;
filter: drop-shadow(0 0 10px gold);
}

.hero img{
width:260px;
border-radius:15px;
box-shadow:0 0 25px gold;
}

.price{font-size:28px;color:gold}
.old{text-decoration:line-through;color:#aaa}

.container{max-width:900px;margin:auto;padding:20px}

.card{background:rgba(0,0,0,0.7);padding:20px;border-radius:15px;margin:15px 0}

.btn{background:#25D366;color:white;padding:15px;border:none;border-radius:10px;font-size:16px;cursor:pointer;width:100%}

.options{display:flex;gap:10px;margin:15px 0}
.option{flex:1;padding:10px;background:#222;border-radius:10px;cursor:pointer}
.option.active{background:gold;color:black}

input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none}

footer{text-align:center;padding:20px;color:gold}
</style>
</head>

<body>

<header>

<div></div>

<!-- 🌍 LANGUAGE BUTTON -->
<div class="lang-container">
<button class="lang-btn" onclick="toggleLangMenu()">🌍</button>

<div class="lang-menu" id="langMenu">
<button onclick="setLang('ar')">🇸🇦 العربية</button>
<button onclick="setLang('fr')">🇫🇷 Français</button>
<button onclick="setLang('en')">🇬🇧 English</button>
<button onclick="setLang('es')">🇪🇸 Español</button>
<button onclick="setLang('de')">🇩🇪 Deutsch</button>
</div>

</div>

</header>

<div class="hero">

<img src="logo.png" class="main-logo">

<img id="mainProduct" src="product1.jpg">

<h1 id="title">عسل السلطان 💪</h1>
<p id="desc">عسل طبيعي غني بالطاقة والحيوية.</p>
<p id="use">طريقة الاستعمال: ملعقة صغيرة يومياً.</p>

<div class="old">200 DH</div>
<div class="price" id="price">150 DH</div>

</div>

<div class="container">

<div class="card">
<h3 id="offerTitle">📦 اختر العرض</h3>
</div>

<div class="card">
<h3 id="features">💎 المميزات</h3>
<p id="f1">✔ طاقة ونشاط</p>
<p id="f2">✔ عسل طبيعي</p>
<p id="f3">✔ جودة عالية</p>
</div>

<div class="card">
<h3 id="order">📦 معلومات الطلب</h3>
<input id="name" placeholder="الاسم الكامل">
<input id="phone" placeholder="رقم الهاتف">
<input id="city" placeholder="المدينة">
<button class="btn">تأكيد الطلب</button>
</div>

</div>

<footer>© Asel Sultan Premium</footer>

<script>

/* MENU */
function toggleLangMenu(){
let menu=document.getElementById("langMenu");
menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* TRANSLATIONS */
const translations = {
ar:{
title:"عسل السلطان 💪",
desc:"عسل طبيعي غني بالطاقة والحيوية.",
use:"طريقة الاستعمال: ملعقة صغيرة يومياً.",
offer:"📦 اختر العرض",
features:"💎 المميزات",
f1:"✔ طاقة ونشاط",
f2:"✔ عسل طبيعي",
f3:"✔ جودة عالية",
order:"📦 معلومات الطلب"
},
fr:{
title:"Miel Sultan 💪",
desc:"Miel naturel riche en énergie et vitalité.",
use:"Utilisation: une cuillère par jour.",
offer:"📦 Choisir l'offre",
features:"💎 Avantages",
f1:"✔ Énergie",
f2:"✔ Miel naturel",
f3:"✔ Haute qualité",
order:"📦 Informations commande"
},
en:{
title:"Sultan Honey 💪",
desc:"Natural honey full of energy and vitality.",
use:"Usage: one spoon daily.",
offer:"📦 Choose offer",
features:"💎 Features",
f1:"✔ Energy",
f2:"✔ Natural honey",
f3:"✔ High quality",
order:"📦 Order info"
},
es:{
title:"Miel Sultán 💪",
desc:"Miel natural rico en energía y vitalidad.",
use:"Uso: una cucharada diaria.",
offer:"📦 Elegir oferta",
features:"💎 Características",
f1:"✔ Energía",
f2:"✔ Miel natural",
f3:"✔ Alta calidad",
order:"📦 Información pedido"
},
de:{
title:"Sultan Honig 💪",
desc:"Natürlicher Honig voller Energie.",
use:"Verwendung: ein Löffel täglich.",
offer:"📦 Angebot wählen",
features:"💎 Vorteile",
f1:"✔ Energie",
f2:"✔ Natürlicher Honig",
f3:"✔ Hohe Qualität",
order:"📦 Bestellinfo"
}
};

/* CHANGE LANGUAGE */
function setLang(lang){
let t = translations[lang];

document.getElementById("title").innerText=t.title;
document.getElementById("desc").innerText=t.desc;
document.getElementById("use").innerText=t.use;

document.getElementById("offerTitle").innerText=t.offer;
document.getElementById("features").innerText=t.features;
document.getElementById("f1").innerText=t.f1;
document.getElementById("f2").innerText=t.f2;
document.getElementById("f3").innerText=t.f3;
document.getElementById("order").innerText=t.order;

document.getElementById("langMenu").style.display="none";
}

/* CLOSE MENU OUTSIDE CLICK */
document.addEventListener("click", function(e){
if(!e.target.closest(".lang-container")){
document.getElementById("langMenu").style.display="none";
}
});
</script>

</body>
</html>
