<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asel Sultan Premium</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
padding-top:70px;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('background.jpg') no-repeat center center/cover;
z-index:-1;
}

/* HEADER */
header{
display:flex;
justify-content:flex-end;
align-items:center;
padding:15px 25px;
background:rgba(0,0,0,0.6);
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

/* LANGUAGE */
.lang-btn{
font-size:26px;
background:none;
border:none;
cursor:pointer;
color:white;
}

/* HERO FIXED CENTER */
.hero{
text-align:center;
padding:30px 15px;
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

/* LOGO FIXED */
.main-logo{
width:140px;
height:auto;
display:block;
margin:10px auto;
filter: drop-shadow(0 0 10px gold);
}

/* PRODUCT IMAGE FIXED */
.product-img{
width:260px;
max-width:90%;
border-radius:15px;
box-shadow:0 0 25px gold;
display:block;
margin:auto;
}

/* PRICE */
.price{
font-size:28px;
color:gold;
}

.old{
text-decoration:line-through;
color:#aaa;
}

/* CONTAINER CENTER */
.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* CARD */
.card{
background:rgba(0,0,0,0.7);
padding:20px;
border-radius:15px;
margin:15px 0;
text-align:center;
}

/* BUTTON */
.btn{
background:#25D366;
color:white;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
width:100%;
}

/* OPTIONS */
.options{
display:flex;
gap:10px;
justify-content:center;
margin:15px 0;
flex-wrap:wrap;
}

.option{
padding:10px 15px;
background:#222;
border-radius:10px;
cursor:pointer;
min-width:60px;
text-align:center;
}

.option.active{
background:gold;
color:black;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
color:gold;
}

/* MOBILE FIX */
@media(max-width:768px){
.product-img{width:90%;}
.main-logo{width:110px;}
}
</style>
</head>

<body>

<header>
<button class="lang-btn">🌍</button>
</header>

<!-- HERO -->
<div class="hero">

<img src="logo.png" class="main-logo">

<img src="product1.jpg" class="product-img">

<h1>عسل السلطان 💪</h1>
<p>عسل طبيعي غني بالطاقة</p>

<div class="old">200 DH</div>
<div class="price" id="price">150 DH</div>

</div>

<!-- CONTENT -->
<div class="container">

<div class="card">
<h3>📦 الكمية</h3>

<div class="options">
<div class="option active" onclick="setQty(1,this)">1</div>
<div class="option" onclick="setQty(2,this)">2</div>
<div class="option" onclick="setQty(3,this)">3</div>
<div class="option" onclick="setQty(4,this)">4+</div>
</div>

<p id="total" style="color:gold;font-size:22px;">150 DH</p>
</div>

<div class="card">
<h3>📦 الطلب</h3>
<input placeholder="الاسم">
<input placeholder="الهاتف">
<input placeholder="المدينة">
<button class="btn" onclick="order()">تأكيد الطلب</button>
</div>

</div>

<footer>© Asel Sultan Premium</footer>

<script>

let qty = 1;

function setQty(q,el){
qty = q;

document.querySelectorAll('.option').forEach(o=>o.classList.remove('active'));
el.classList.add('active');

calc();
}

function calc(){

let price = 0;

if(qty==1) price=150;
else if(qty==2) price=280;
else if(qty==3) price=400;
else price=100*qty;

if(qty>5) price = price*0.9;

document.getElementById("total").innerText = price.toFixed(0)+" DH";
}

function order(){

let price = document.getElementById("total").innerText;

let msg = "🛒 Order:%0AQty: "+qty+"%0APrice: "+price;

window.open("https://wa.me/212665191677?text="+msg);
}

</script>

</body>
</html>
