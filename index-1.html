<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asel Sultan Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Cairo',sans-serif;
  color:white;
  background:url('background.jpg') no-repeat center center fixed;
  background-size:cover;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(0px);
  z-index:-1;
  transition:0.5s;
}

body.scrolled::before{
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.7);
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  background:transparent;
}

.logo img{
  width:160px;
  filter:drop-shadow(0 0 10px gold);
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.btn{
  background:linear-gradient(45deg,gold,#ffcc00);
  color:black;
  padding:12px 20px;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

.hero{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  padding:60px 20px;
  gap:40px;
}

.product-container{
  position:relative;
  width:320px;
}

.product-container img{
  width:100%;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,215,0,0.6);
  transition:0.6s;
}

.product2{
  position:absolute;
  top:0;
  left:0;
  opacity:0;
}

.product-container.show-second .product2{
  opacity:1;
}

.hero-text{
  max-width:400px;
  text-align:right;
}

.hero-text h1{
  font-size:34px;
  color:gold;
}

.price{
  font-size:28px;
  color:gold;
}

.old{
  text-decoration:line-through;
  color:#aaa;
}

.section{
  padding:60px 20px;
  text-align:center;
}

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  background:rgba(0,0,0,0.5);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
}

.form{
  max-width:400px;
  margin:auto;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

footer{
  padding:20px;
  text-align:center;
  color:gold;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
  </div>
  <button class="btn" onclick="scrollToOrder()">اطلب الآن</button>
</header>

<section class="hero">
  <div class="product-container" id="product">
    <img src="product1.jpg">
    <img src="product2.jpg" class="product2">
  </div>

  <div class="hero-text">
    <h1>عسل السلطان بالجنسنغ</h1>
    <p>طاقة 🔥 نشاط ⚡ جودة فاخرة</p>
    <div class="old">200 DH</div>
    <div class="price">150 DH</div>
    <button class="btn" onclick="orderNow()">اطلب عبر واتساب</button>
  </div>
</section>

<section class="section">
  <h2>💎 المميزات</h2>
  <div class="cards">
    <div class="card">✔ طاقة يومية قوية</div>
    <div class="card">✔ عسل طبيعي + جينسينغ</div>
    <div class="card">✔ منتج فاخر ومجرب</div>
  </div>
</section>

<section class="section" id="order">
  <h2>📦 اطلب الآن</h2>
  <div class="form">
    <input type="text" placeholder="الاسم الكامل">
    <input type="text" placeholder="رقم الهاتف">
    <input type="text" placeholder="المدينة">
    <button class="btn" onclick="sendOrder()">تأكيد الطلب</button>
  </div>
</section>

<footer>© Asel Sultan Premium</footer>

<script>
window.addEventListener("scroll", function(){
  if(window.scrollY > 100){
    document.body.classList.add("scrolled");
  } else {
    document.body.classList.remove("scrolled");
  }
});

window.addEventListener("scroll", function(){
  const product = document.getElementById("product");
  const trigger = product.offsetTop;

  if(window.scrollY > trigger){
    product.classList.add("show-second");
  } else {
    product.classList.remove("show-second");
  }
});

function orderNow(){
  window.open('https://wa.me/212665191677?text=بغيت%20نطلب%20Asel%20Sultan');
}

function scrollToOrder(){
  document.getElementById('order').scrollIntoView({behavior:'smooth'});
}

function sendOrder(){
  let inputs=document.querySelectorAll('input');
  let text=`طلب جديد:%0Aالاسم: ${inputs[0].value}%0Aالهاتف: ${inputs[1].value}%0Aالمدينة: ${inputs[2].value}`;
  window.open('https://wa.me/212665191677?text='+text);
}
</script>

</body>
</html>
